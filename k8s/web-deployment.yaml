apiVersion: apps/v1
kind: Deployment
metadata:
  name: hospital-web
  namespace: hospital
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hospital-web
  template:
    metadata:
      labels:
        app: hospital-web
    spec:
      containers:
        - name: web
          image: hospital-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "128m"
              memory: "128Mi"
            limits:
              cpu: "256m"
              memory: "256Mi"
