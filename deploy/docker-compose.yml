version: "3.8"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hospital-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Hospital@2024"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./database:/scripts   # 手动初始化: docker exec ... /scripts/000_init_database.sql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Hospital@2024" -C -Q "SELECT 1" || exit 1
      interval: 10s
      retries: 10
      start_period: 30s

  hospital-api:
    build:
      context: .
      dockerfile: src/Hospital.Api/Dockerfile
    container_name: hospital-api
    ports:
      - "5075:8080"     # 宿主机 5075 -> 容器 8080
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # 在 .NET 中 __ 双下划线作为配置键层级分隔符
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=Hospital;User Id=sa;Password=Hospital@2024;TrustServerCertificate=True"
      JwtSettings__SecretKey: "ThisIsADevelopmentSecretKey_MustBeAtLeast32Characters!"
      JwtSettings__Issuer: "HospitalApi"
      JwtSettings__Audience: "HospitalApp"
      JwtSettings__ExpirationHours: "24"
    depends_on:
      sqlserver:
        condition: service_healthy

  hospital-web:
    build:
      context: hospital-web
      dockerfile: Dockerfile
    container_name: hospital-web
    ports:
      - "8080:80"
    depends_on:
      - hospital-api

volumes:
  sqlserver-data:
